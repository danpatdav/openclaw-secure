name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Proxy Tests (unit + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Run all proxy tests (unit + e2e)
        run: bun test

  analyzer-test:
    name: Analyzer Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analyzer
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run analyzer tests
        run: bun test

  agent-test:
    name: Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run agent tests
        run: bun test

  bicep-validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate main infrastructure
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Validate ACI container group
        run: az bicep build --file infra/aci/container-group.bicep --stdout > /dev/null

      - name: Validate ACI analyzer group
        run: az bicep build --file infra/aci/analyzer-group.bicep --stdout > /dev/null

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: proxy
            name: proxy
          - context: openclaw
            name: openclaw
          - context: analyzer
            name: analyzer
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.name }} image
        run: docker build -t openclaw-${{ matrix.name }}:ci-test ${{ matrix.context }}

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded API keys
        run: |
          echo "Scanning for hardcoded secrets..."
          PATTERNS=(
            'sk-ant-[a-zA-Z0-9]{20,}'
            'AKIA[0-9A-Z]{16}'
            'ghp_[a-zA-Z0-9]{36}'
            'xai-[a-zA-Z0-9]{20,}'
            'sk-[a-zA-Z0-9]{20,}'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rE "$pattern" --include='*.ts' --include='*.json' --include='*.bicep' --include='*.sh' --include='*.md' . | grep -v 'node_modules' | grep -v '.git/'; then
              echo "FAIL: Found potential secret matching pattern: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Hardcoded secrets detected. Remove them and use Azure Key Vault."
            exit 1
          fi
          echo "PASS: No hardcoded secrets found."

      - name: Verify SOUL.md integrity baseline
        run: |
          if [ -f .soul-checksum ]; then
            ./scripts/check-soul-integrity.sh
          else
            echo "No .soul-checksum baseline yet (first run). Skipping."
          fi

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install proxy dependencies
        working-directory: proxy
        run: bun install --frozen-lockfile || bun install

      - name: TypeScript type-check (proxy)
        working-directory: proxy
        run: bunx tsc --noEmit

      - name: Import boundary check (agent must use proxy)
        run: |
          echo "Checking agent.mjs for direct HTTP imports that bypass proxy..."
          FORBIDDEN_IMPORTS=(
            'node:http'
            'node:https'
            'node-fetch'
            'axios'
            'got'
            'superagent'
            'urllib'
          )
          FOUND=0
          for mod in "${FORBIDDEN_IMPORTS[@]}"; do
            if grep -n "import.*['\"]${mod}['\"]" openclaw/agent.mjs; then
              echo "FAIL: agent.mjs imports '$mod' — must use proxiedFetch via undici ProxyAgent"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Agent imports HTTP modules that bypass the proxy. Use proxiedFetch instead."
            exit 1
          fi
          echo "PASS: Agent does not import any direct HTTP modules."

  security-scan:
    name: Security Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}
        continue-on-error: false

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: proxy
          - component: openclaw
          - component: analyzer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate package-lock and audit (${{ matrix.component }})
        working-directory: ${{ matrix.component }}
        run: |
          npm install --package-lock-only --ignore-scripts 2>/dev/null
          echo "Running npm audit for ${{ matrix.component }}..."
          npm audit --omit=dev || echo "::warning::Vulnerabilities found in ${{ matrix.component }} — review npm audit output above"

  scripts-lint:
    name: Lint Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts are executable
        run: |
          for f in scripts/*.sh; do
            if [ ! -x "$f" ]; then
              echo "FAIL: $f is not executable"
              exit 1
            fi
          done
          echo "PASS: All scripts are executable."

      - name: Shellcheck
        run: |
          if command -v shellcheck &> /dev/null; then
            shellcheck scripts/*.sh || true
          else
            echo "shellcheck not available, skipping"
          fi
